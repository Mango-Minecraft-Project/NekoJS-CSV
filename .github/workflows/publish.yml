name: Auto Build and Publish

on:
  push:
    branches:
      - '**' # 監聽所有分支的 Push 事件

jobs:
  # 階段 1：自動提取環境資訊
  prepare-info:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.vars.outputs.branch }}
      project_name: ${{ steps.vars.outputs.project_name }}
      version: ${{ steps.vars.outputs.version }}
      should_publish: ${{ steps.vars.outputs.should_publish }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Project Info
        id: vars
        run: |
          # 1. 自動獲取當前分支短名稱 (例如 main, dev, feature-x)
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # 2. 從 settings.gradle 自動提取專案名稱 (若提取失敗則預設為 Project)
          P_NAME=$(grep "rootProject.name" settings.gradle | cut -d"'" -f2 | cut -d'"' -f2 || echo "Project")
          echo "project_name=$P_NAME" >> $GITHUB_OUTPUT
          
          # 3. 偵測 Commit Message 中的 "update x.x.x"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          REGEX="update ([0-9a-zA-Z.-]+)"
          
          if [[ "$COMMIT_MSG" =~ $REGEX ]]; then
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

  # 階段 2：編譯並上傳 Artifact (所有分支都會執行)
  build-and-artifact:
    needs: prepare-info
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Project
        run: |
          chmod +x ./gradlew
          ./gradlew build

      # 將編譯好的檔案存入 Artifact，名稱格式為：專案名-分支名
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare-info.outputs.project_name }}-${{ needs.prepare-info.outputs.branch }}
          path: build/libs/*.jar
          retention-days: 7

  # 階段 3：正式發佈 (🌟 關鍵修改：僅限 main 分支且包含 update 關鍵字)
  publish-release:
    needs: [prepare-info, build-and-artifact]
    # 權限控管：必須包含 update 關鍵字，且分支必須是 main
    if: |
      needs.prepare-info.outputs.should_publish == 'true' && 
      needs.prepare-info.outputs.branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 下載剛才在 build-and-artifact 階段產生的檔案
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare-info.outputs.project_name }}-${{ needs.prepare-info.outputs.branch }}
          path: build/libs/

      - name: Generate Changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)")
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"* %s (%h)")
          fi
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-info.outputs.version }}
          name: "${{ needs.prepare-info.outputs.project_name }} v${{ needs.prepare-info.outputs.version }}"
          body: |
            ## 🚀 Automated Release (Main Branch)
            
            ### 📝 更新日誌 (Changelog)
            ${{ steps.changelog.outputs.notes }}
          files: build/libs/*.jar